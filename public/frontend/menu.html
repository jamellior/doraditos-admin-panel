<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Pollos Los Doraditos</title>
  <!-- Rutas absolutas apuntando a la carpeta frontend dentro de public -->
  <link rel="stylesheet" type="text/css" href="/frontend/css/bootstrap.css" />
  <link href="/frontend/css/style.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  
  <style>
    body { background-color: #121212; color: #ffffff; }
    .header-section { width: 100%; padding: 40px 20px; text-align: center; background: #000; }
    .header-section img { max-width: 300px; width: 100%; height: auto; margin: 0 auto; }
    #carrito-flotante { position: fixed; bottom: 80px; right: 20px; z-index: 9999; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 300px; display: none; color: white; }
    .box { background: #1e1e1e !important; border: 1px solid #333 !important; }
    h5, h6, p { color: #ffffff !important; }
    .footer_section { background-color: #000; color: #fff; padding: 40px 0; border-top: 2px solid #333; }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header-section">
      <img src="/frontend/images/logohigh.png" alt="Logo Los Doraditos">
  </header>

  <!-- BOTÓN CARRITO -->
  <button id="btn-toggle-carrito" class="btn btn-primary" onclick="window.toggleCarrito()" style="position:fixed; bottom:20px; right:20px; z-index:10000; border-radius:50%; padding: 15px;">
    <i class="fa fa-shopping-cart"></i>
  </button>

  <!-- CARRITO FLOTANTE -->
  <div id="carrito-flotante">
    <h5>Tu Pedido</h5>
    <ul id="lista-carrito" style="list-style: none; padding: 0;"><li>Vacío.</li></ul>
    <hr style="border-top: 1px solid #444;">
    <strong id="total-carrito">Total: ₡0</strong>
    <button onclick="window.vaciarCarrito()" class="btn btn-danger btn-sm w-100 mt-2">Vaciar</button>
    <button onclick="window.finalizarPedido()" class="btn btn-success btn-sm w-100 mt-2">Finalizar Pedido</button>
  </div>

  <!-- SECCIÓN MENÚ -->
  <section class="food_section layout_padding">
    <div class="container">
      <div class="heading_container heading_center">
        <h2>Nuestro Menú</h2>
      </div>
      
      <!-- CONTENEDOR DE CATEGORÍAS -->
      <div class="filters_menu text-center mb-4" id="filters-container">
        <button class="btn btn-outline-light active" onclick="window.filtrarMenu('Todos')">Todos</button>
      </div>

      <!-- CONTENEDOR DE PRODUCTOS -->
      <div class="row grid" id="menu-container">
        <p class="text-center w-100">Cargando delicias...</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer_section">
    <div class="container">
      <div class="row">
        <div class="col-md-4 footer-col">
          <h4>Contacto</h4>
          <p><i class="fa fa-map-marker"></i> San Miguel de Santo Domingo, Heredia.</p>
          <p><i class="fa fa-phone"></i> +506 2235-9416</p>
          <p><i class="fa fa-whatsapp"></i> WhatsApp: +506 8441-2970</p>
        </div>
        <div class="col-md-4 footer-col">
          <h4>Redes</h4>
          <p><i class="fa fa-facebook"></i> pollolosdoraditos</p>
          <p><i class="fa fa-instagram"></i> @pollolosdoraditos</p>
        </div>
        <div class="col-md-4 footer-col text-center">
          <img src="/frontend/images/mymenuqrlogo.png" alt="Logo" style="max-width: 150px;">
        </div>
      </div>
    </div>
  </footer>

  <!-- LIBRERÍA DE SUPABASE DESDE CDN (GLOBAL) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Inicialización del cliente Supabase
    const supabase = supabase.createClient(
        'https://ffgvezfpfxfwutrtrxme.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZ3ZlemZwZnhmd3V0cnRyeG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTA2OTksImV4cCI6MjA5Nzg4NjY5OX0.4t6RVDVvsIAbHfbNpILeQbWvgJPNjy47ZrIFH5iD3Lk'
    );

    let carrito = [];
    let menuCompleto = [];

    // Funciones globales asignadas a window para evitar errores "is not defined"
    window.toggleCarrito = () => {
        const c = document.getElementById('carrito-flotante');
        c.style.display = (c.style.display === 'block') ? 'none' : 'block';
    };

    window.vaciarCarrito = () => {
        if(confirm("¿Borrar todo el pedido?")) { 
            carrito = []; 
            window.actualizarVistaCarrito(); 
        }
    };

    window.filtrarMenu = (cat) => {
        const filtrados = (cat === 'Todos') ? menuCompleto : menuCompleto.filter(p => p.categoria === cat);
        renderizar(filtrados);
    };

    window.agregar = (nombre, precio) => { 
        carrito.push({ nombre, precio }); 
        window.actualizarVistaCarrito(); 
        alert(nombre + " añadido al pedido."); 
    };

    window.actualizarVistaCarrito = () => {
        const lista = document.getElementById('lista-carrito');
        if (carrito.length === 0) {
            lista.innerHTML = '<li>Vacío.</li>';
        } else {
            lista.innerHTML = carrito.map(i => `<li>• ${i.nombre} - ₡${i.precio}</li>`).join('');
        }
        const total = carrito.reduce((s, i) => s + parseFloat(i.precio), 0);
        document.getElementById('total-carrito').innerText = 'Total: ₡' + total;
    };

    window.finalizarPedido = () => {
        if (carrito.length === 0) return;
        
        const total = carrito.reduce((s, i) => s + parseFloat(i.precio), 0);
        let textoPedido = "¡Hola! Quisiera realizar el siguiente pedido:\n\n";
        
        carrito.forEach(i => {
            textoPedido += `• ${i.nombre} (₡${i.precio})\n`;
        });
        
        textoPedido += `\n*Total: ₡${total}*`;
        
        // Abre la API de WhatsApp de una vez con el mensaje estructurado
        const urlWhatsapp = `https://wa.me/50684412970?text=${encodeURIComponent(textoPedido)}`;
        window.open(urlWhatsapp, '_blank');
    };

    function renderizar(data) {
        const container = document.getElementById('menu-container');
        if (data.length === 0) {
            container.innerHTML = '<p class="text-center w-100">No hay productos en esta categoría.</p>';
            return;
        }
        
        container.innerHTML = data.map(p => `
            <div class="col-sm-6 col-lg-4">
                <div class="box">
                    ${p.imagen_url ? `
                        <div class="img-box" style="background:#000; padding:10px;">
                            <img src="${p.imagen_url}" style="width:100%; height:auto;" alt="${p.nombre}">
                        </div>
                    ` : ''}
                    <div class="detail-box" style="padding:15px;">
                        <h5>${p.nombre}</h5>
                        <p style="color: #ccc; font-size: 0.9rem;">${p.descripcion || 'Sin descripción'}</p>
                        <h6>₡${p.precio}</h6>
                        <button onclick="window.agregar('${p.nombre.replace(/'/g, "\\'")}', ${p.precio})" class="btn btn-primary mt-2">
                            <i class="fa fa-plus"></i> Añadir
                        </button>
                    </div>
                </div>
            </div>`).join('');
    }

    function generarBotones(data) {
        const cats = ['Todos', ...new Set(data.map(p => p.categoria).filter(c => c))];
        document.getElementById('filters-container').innerHTML = cats.map(c => 
            `<button class="btn btn-outline-light m-1" onclick="window.filtrarMenu('${c}')">${c}</button>`
        ).join('');
    }

    async function cargarMenu() {
        // Carga rápida desde caché local si existe
        const cachedMenu = localStorage.getItem('menu_doraditos');
        if (cachedMenu) {
            menuCompleto = JSON.parse(cachedMenu);
            renderizar(menuCompleto);
            generarBotones(menuCompleto);
        }

        // Petición real a Supabase para pintar los datos actualizados
        try {
            const { data, error } = await supabase.from('menu_doraditos').select('*');
            if (error) throw error;
            
            if (data) {
                menuCompleto = data;
                localStorage.setItem('menu_doraditos', JSON.stringify(data));
                renderizar(menuCompleto);
                generarBotones(menuCompleto);
            }
        } catch (err) {
            console.error("Error conectando con Supabase:", err);
        }
    }

    // Ejecución inicial
    cargarMenu();
  </script>
</body>
</html>
