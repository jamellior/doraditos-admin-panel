<body>
  <!-- ... (Todo tu HTML aquí igual que lo tienes) ... -->
  
  <section class="food_section layout_padding">
    <div class="container">
      <div id="filters-container" class="text-center"></div>
      <div class="row" id="menu-container">Cargando...</div>
    </div>
  </section>

  <!-- 1. Cargamos Supabase vía CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 2. Inicializamos directamente
    const supabase = supabase.createClient(
        'https://ffgvezfpfxfwutrtrxme.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZ3ZlemZwZnhmd3V0cnRyeG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTA2OTksImV4cCI6MjA5Nzg4NjY5OX0.4t6RVDVvsIAbHfbNpILeQbWvgJPNjy47ZrIFH5iD3Lk'
    );

    let menuCompleto = [];

    // 3. Declaramos las funciones aquí ABAJO para que sean globales y no den "is not defined"
    window.filtrarMenu = function(cat) {
        const filtrados = (cat === 'Todos') ? menuCompleto : menuCompleto.filter(p => p.categoria === cat);
        renderizar(filtrados);
    };

    function renderizar(data) {
        const container = document.getElementById('menu-container');
        container.innerHTML = data.map(p => `
            <div class="col-md-4">
                <div class="box">
                    <h5>${p.nombre}</h5>
                    <h6>₡${p.precio}</h6>
                </div>
            </div>`).join('');
    }

    async function cargarMenu() {
        const { data } = await supabase.from('menu_doraditos').select('*');
        if (data) {
            menuCompleto = data;
            renderizar(menuCompleto);
        }
    }

    // Arrancamos
    cargarMenu();
  </script>
